<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aether — AI Agent + Personal RAG</title>
<style>
  :root { --bg:#0b0b12; --panel:#14141f; --panel2:#0e0e18; --accent:#7c6cff; --accent2:#27c6a1; --text:#e8e8f0; --muted:#8a8aa0; --danger:#ff6b6b; --border:#24243c; --card:#15151f; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:Inter,Segoe UI,system-ui,sans-serif; background:var(--bg); color:var(--text); }

  /* ---- opening animation ---- */
  #splash { position:fixed; inset:0; background:radial-gradient(circle at 50% 40%, #1a1730, #0b0b12 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99; transition:opacity .5s; }
  #splash.hide { opacity:0; pointer-events:none; }
  .logo-spin { width:84px; height:84px; border-radius:20px; animation:pulse 1.6s ease-in-out infinite; box-shadow:0 0 40px rgba(124,108,255,.5); }
  @keyframes pulse { 0%,100%{ transform:scale(1); opacity:.85 } 50%{ transform:scale(1.08); opacity:1 } }
  #splash h1 { margin:20px 0 4px; font-size:24px; letter-spacing:.04em; }
  #splash p { color:var(--muted); font-size:13px; }
  .bar { width:160px; height:4px; border-radius:4px; background:#22223a; margin-top:18px; overflow:hidden; }
  .bar i { display:block; height:100%; width:40%; background:var(--accent); animation:load 1.2s ease-in-out infinite; }
  @keyframes load { 0%{ margin-left:-40% } 100%{ margin-left:100% } }

  /* ---- layout ---- */
  .app { display:flex; height:100vh; }
  .sidebar { width:230px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .brand { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--border); }
  .brand img { width:30px; height:30px; border-radius:8px; }
  .brand b { font-size:15px; }
  .brand span { display:block; color:var(--muted); font-size:10px; font-weight:400; }
  .nav { flex:1; overflow:auto; padding:8px; }
  .nav button { width:100%; text-align:left; background:transparent; border:0; color:var(--muted); padding:9px 12px; border-radius:9px; cursor:pointer; font-size:13px; margin-bottom:3px; display:flex; align-items:center; gap:9px; }
  .nav button:hover { background:var(--panel2); color:var(--text); }
  .nav button.active { background:var(--accent); color:#fff; }
  .nav .em { width:18px; text-align:center; }
  .session-panel { margin:6px 4px 10px; border-top:1px solid var(--border); padding-top:8px; }
  .session-head { display:flex; align-items:center; justify-content:space-between; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.05em; padding:0 8px 6px; }
  .session-head .iconbtn { width:22px; height:22px; font-size:14px; border-radius:6px; }
  .session-list { max-height:34vh; overflow:auto; display:flex; flex-direction:column; gap:3px; }
  .session-item { display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:8px; cursor:pointer; color:var(--muted); font-size:12px; background:transparent; border:0; text-align:left; width:100%; }
  .session-item:hover { background:var(--panel2); }
  .session-item.active { background:var(--panel2); color:var(--text); border-left:2px solid var(--accent); }
  .session-item .s-main { flex:1; min-width:0; }
  .session-item .s-title { font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .session-item .s-preview { color:var(--muted); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .session-item .s-meta { display:flex; align-items:center; gap:4px; position:relative; }
  .ctx-circle { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:var(--text); flex-shrink:0; }
  .ctx-circle span { background:var(--panel); border-radius:50%; width:19px; height:19px; display:flex; align-items:center; justify-content:center; }
  .dotbtn { background:transparent; border:0; color:var(--muted); cursor:pointer; font-size:15px; padding:0 4px; border-radius:6px; }
  .dotbtn:hover { background:var(--panel2); color:var(--text); }
  .s-menu { position:absolute; right:0; top:26px; background:var(--panel); border:1px solid var(--border); border-radius:9px; z-index:30; display:flex; flex-direction:column; min-width:118px; box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .s-menu button { background:transparent; border:0; color:var(--text); text-align:left; padding:8px 12px; cursor:pointer; font-size:12px; border-radius:6px; }
  .s-menu button:hover { background:var(--panel2); }
  .s-menu button.danger { color:#ff6b6b; }
  .attach-btn { background:var(--panel2); border:0; color:var(--muted); width:36px; border-radius:9px; cursor:pointer; font-size:16px; }
  .attach-btn:hover { color:var(--accent); }
  .attached { display:flex; gap:6px; flex-wrap:wrap; padding:5px 10px 0; }
  .attached .chip { background:var(--panel2); border:1px solid var(--border); border-radius:999px; padding:3px 10px; font-size:11px; color:var(--muted); }
  .session-item .del { opacity:0; color:var(--danger); background:transparent; border:0; cursor:pointer; font-size:13px; padding:0 3px; }
  .session-item:hover .del { opacity:.8; }
  .session-item .del:hover { opacity:1; }

  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--panel); flex-wrap:wrap; }
  .topbar .toggle { display:flex; background:var(--panel2); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .topbar .toggle button { background:transparent; color:var(--muted); border:0; padding:6px 14px; cursor:pointer; font-weight:600; font-size:12px; }
  .topbar .toggle button.active { background:var(--accent); color:#fff; }
  .view { flex:1; min-height:0; overflow:auto; }
  .panel { padding:22px; max-width:1080px; margin:0 auto; }
  .panel h2 { font-size:17px; margin:0 0 4px; }
  .panel .sub { color:var(--muted); font-size:12px; margin-bottom:16px; }

  /* chat */
  .chat-wrap { display:flex; flex-direction:column; height:100%; }
  .messages { flex:1; overflow:auto; padding:22px; }
  .msg { max-width:78%; margin-bottom:14px; padding:11px 14px; border-radius:14px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; font-size:14px; }
  .msg.user { background:var(--accent); margin-left:auto; border-bottom-right-radius:4px; }
  .msg.ai { background:var(--panel); border:1px solid var(--border); border-bottom-left-radius:4px; }
  /* execution-step timeline (animation while the agent works) */
  .answer-body { white-space:pre-wrap; word-break:break-word; padding:2px 0; }
  .steps { width:100%; margin:6px 0; display:flex; flex-direction:column; gap:4px; }
  .step { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); padding:5px 9px; border-radius:7px; background:var(--panel2); border-left:2px solid var(--border); animation:stepin .25s ease; }
  @keyframes stepin { from {opacity:0; transform:translateY(4px);} to {opacity:1; transform:none;} }
  .step .ic { font-size:13px; }
  .step .tt { color:var(--accent2); font-weight:600; }
  .step .ta { color:var(--muted); font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; opacity:.85; max-width:55%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .step .tr { color:var(--muted); font-size:11px; opacity:.7; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; }
  .step.done { border-left-color:var(--ok); color:var(--text); }
  .step.done .spin { display:none; }
  .step-thinking.done { border-left-color:var(--accent); }
  .spin { display:inline-block; animation:blink 1s steps(2,start) infinite; color:var(--accent); }
  @keyframes blink { 50% { opacity:0; } }
  .mode-tag { font-size:10px; color:var(--accent2); margin-bottom:4px; text-transform:uppercase; letter-spacing:.05em; }
  .cites { margin-top:8px; padding-top:8px; border-top:1px dashed var(--border); font-size:11px; color:var(--muted); }
  .cites b { color:var(--accent2); }
  .composer { display:flex; gap:10px; padding:14px 16px; border-top:1px solid var(--border); background:var(--panel); }
  .composer textarea { flex:1; resize:none; height:46px; background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:12px; font-family:inherit; }
  .composer button { background:var(--accent); color:#fff; border:0; padding:0 20px; border-radius:10px; font-weight:700; cursor:pointer; }
  .composer button:disabled { opacity:.5; }

  /* generic */
  .btn { background:var(--accent); color:#fff; border:0; padding:8px 14px; border-radius:9px; cursor:pointer; font-size:13px; font-weight:600; }
  .btn.ghost { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn.danger { background:transparent; border:1px solid var(--danger); color:var(--danger); }
  .btn.sm { padding:5px 10px; font-size:12px; }
  input, textarea, select { width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px; font-family:inherit; font-size:13px; margin-bottom:8px; }
  textarea.code { min-height:200px; font-family:Consolas,Menlo,monospace; font-size:12px; line-height:1.5; }
  .hint { color:var(--muted); font-size:11px; margin-top:6px; }
  .ok { color:var(--accent2); font-size:12px; margin-top:6px; }
  .err { color:var(--danger); font-size:12px; margin-top:6px; }
  .pill { display:inline-block; background:#1c1c2e; color:var(--muted); font-size:10px; padding:2px 8px; border-radius:8px; }
  .pathbox { background:#0a0a12; border:1px dashed var(--border); border-radius:8px; padding:9px; font-family:Consolas,monospace; font-size:12px; color:var(--accent2); word-break:break-all; }

  /* ===== Card grid (skills / tools / mcp) ===== */
  .addbar { background:var(--panel2); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }
  /* Card spec: top-right toggle + grouped actions; bold name; lowercase use-case footer */
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; display:flex; flex-direction:column; gap:12px; }
  .card .top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .card .id { display:flex; gap:10px; align-items:flex-start; min-width:0; }
  .card .ic { width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,var(--accent),#4a3fb0); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .card .title { font-weight:700; font-size:15px; }
  .card .acts { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .iconbtn { background:var(--panel2); border:1px solid var(--border); color:var(--muted); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:.12s; }
  .iconbtn:hover { color:var(--text); border-color:var(--accent); }
  .iconbtn.danger:hover { color:var(--danger); border-color:var(--danger); }
  .iconbtn.test { font-size:14px; }
  .iconbtn.test.ok { color:var(--accent2); border-color:var(--accent2); }
  .iconbtn.test.bad { color:var(--danger); border-color:var(--danger); }
  /* toggle switch (top-right) */
  .sw { position:relative; width:38px; height:20px; background:#2a2a44; border-radius:20px; cursor:pointer; transition:.15s; flex-shrink:0; border:0; padding:0; }
  .sw.on { background:var(--accent2); }
  .sw::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; background:#fff; border-radius:50%; transition:.15s; }
  .sw.on::after { left:20px; }
  .card .badges { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .badge { background:#1c1c2e; color:var(--muted); font-size:10px; padding:2px 8px; border-radius:8px; text-transform:lowercase; }
  .badge.status-on { background:rgba(39,198,161,.15); color:var(--accent2); }
  .badge.status-off { background:rgba(255,107,107,.12); color:var(--danger); }
  /* use-case footer — STRICTLY lowercase */
  .card .usecase { color:var(--muted); font-size:11px; word-break:break-word; text-transform:lowercase; font-family:Consolas,Menlo,monospace; }
  .empty { color:var(--muted); font-size:12px; padding:20px; text-align:center; }

  /* reasoning selector */
  .reasoning { display:flex; align-items:center; gap:6px; background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:4px 6px; }
  .reasoning label { font-size:11px; color:var(--muted); margin-right:2px; }
  .reasoning select { width:auto; margin:0; padding:5px 8px; border-radius:8px; font-size:12px; }
  .reasoning .rinfo { font-size:10px; color:var(--muted); max-width:220px; }

  /* ===== Settings components ===== */
  .settings-nav { display:flex; gap:6px; flex-wrap:wrap; margin:14px 0; border-bottom:1px solid var(--border); padding-bottom:10px; }
  .settings-nav .sect { background:var(--panel2); border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; }
  .settings-nav .sect.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .settings-body h3 { margin:6px 0 14px; font-size:14px; }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .row label { font-size:13px; }
  .card-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px 18px; margin-bottom:14px; }
  .kv { display:flex; justify-content:space-between; gap:10px; font-size:12px; padding:6px 0; border-bottom:1px dashed var(--border); }
  .kv span { color:var(--muted); }
  .kv code { font-size:11px; word-break:break-all; }
  .switchline { display:flex; align-items:center; gap:8px; font-size:13px; margin:10px 0; cursor:pointer; }
  .swatches { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 16px; }
  .swatch { width:26px; height:26px; border-radius:7px; cursor:pointer; border:2px solid transparent; }
  .swatch:hover { border-color:var(--text); }

  /* ===== Theme palettes (Settings > Appearance) ===== */
  body.theme-dark      { --bg:#0b0b12; --panel:#14141f; --panel2:#0e0e18; --accent:#7c6cff; --accent2:#27c6a1; --text:#e8e8f0; --muted:#8a8aa0; --danger:#ff6b6b; --border:#24243c; --card:#15151f; }
  body.theme-light     { --bg:#f4f5fb; --panel:#ffffff; --panel2:#eef0f7; --accent:#6a5bff; --accent2:#11a888; --text:#1c1c28; --muted:#6a6a80; --danger:#e23b3b; --border:#d8dae8; --card:#ffffff; }
  body.theme-dracula   { --bg:#282a36; --panel:#1e1f29; --panel2:#21222c; --accent:#bd93f9; --accent2:#50fa7b; --text:#f8f8f2; --muted:#6272a4; --danger:#ff5555; --border:#3a3c4a; --card:#21222c; }
  body.theme-nord      { --bg:#2e3440; --panel:#3b4252; --panel2:#353c4a; --accent:#88c0d0; --accent2:#a3be8c; --text:#eceff4; --muted:#8a93a6; --danger:#bf616a; --border:#434c5e; --card:#3b4252; }
  body.theme-one_dark  { --bg:#282c34; --panel:#21252b; --panel2:#2c323c; --accent:#61afef; --accent2:#98c379; --text:#abb2bf; --muted:#7a8290; --danger:#e06c75; --border:#3a3f4b; --card:#21252b; }
  body.theme-github_dark { --bg:#0d1117; --panel:#161b22; --panel2:#010409; --accent:#58a6ff; --accent2:#3fb950; --text:#e6edf3; --muted:#8b949e; --danger:#f85149; --border:#30363d; --card:#161b22; }
  body.theme-monokai   { --bg:#272822; --panel:#1e1f1b; --panel2:#2b2c26; --accent:#a6e22e; --accent2:#66d9ef; --text:#f8f8f2; --muted:#75715e; --danger:#f92672; --border:#3a3b33; --card:#1e1f1b; }
  body.theme-solarized_dark { --bg:#002b36; --panel:#073642; --panel2:#00232b; --accent:#268bd2; --accent2:#859900; --text:#eee8d5; --muted:#586e75; --danger:#dc322f; --border:#0a3c47; --card:#073642; }
  body.theme-gruvbox_dark { --bg:#282828; --panel:#3c3836; --panel2:#32302f; --accent:#d3869b; --accent2:#b8bb26; --text:#ebdbb2; --muted:#a89984; --danger:#fb4934; --border:#504945; --card:#3c3836; }
  body.theme-tokyo_night { --bg:#1a1b26; --panel:#24283b; --panel2:#1f2335; --accent:#7aa2f7; --accent2:#9ece6a; --text:#c0caf5; --muted:#565f89; --danger:#f7768e; --border:#343a55; --card:#24283b; }
  body.theme-github_light { --bg:#ffffff; --panel:#f6f8fa; --panel2:#eaeef2; --accent:#0969da; --accent2:#1a7f37; --text:#1f2328; --muted:#656d76; --danger:#cf222e; --border:#d0d7de; --card:#ffffff; }
  body.theme-solarized_light { --bg:#fdf6e3; --panel:#eee8d5; --panel2:#e8e2cf; --accent:#268bd2; --accent2:#859900; --text:#586e75; --muted:#93a1a1; --danger:#dc322f; --border:#ddd6c1; --card:#eee8d5; }
  body.font-system { font-family: system-ui, "Segoe UI", sans-serif !important; }
  body.font-manrope { font-family: "Manrope", "Segoe UI", system-ui, sans-serif !important; }
  /* square corners toggle */
  body.squared .card, body.squared .panel, body.squared .btn, body.squared .sw,
  body.squared input, body.squared textarea, body.squared select, body.squared .addbar,
  body.squared .msg, body.squared .brand img, body.squared .reasoning, body.squared .nav button,
  body.squared .topbar .toggle { border-radius:0 !important; }
</style>
</head>
<body>

<div id="splash">
  <img class="logo-spin" src="/ui/logo.png" alt="" />
  <h1>Aether</h1>
  <p>AI Agent + Personal RAG</p>
  <div class="bar"><i></i></div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="brand">
      <img src="/ui/logo.png" alt="Aether" />
      <div><b>Aether</b><span>Agent + RAG</span></div>
    </div>
    <div class="nav" id="nav">
      <button class="active" data-view="chat"><span class="em">💬</span><span class="txt">Chat</span></button>
      <div id="session-panel" class="session-panel">
        <div class="session-head"><span>Sessions</span><button class="iconbtn sm" title="New chat" onclick="showView('chat');newSession();">＋</button></div>
        <div id="session-list" class="session-list"></div>
      </div>
      <button data-view="pdfs"><span class="em">📚</span><span class="txt">RAG PDFs</span></button>
      <button data-view="skills"><span class="em">✨</span><span class="txt">Skills</span></button>
      <button data-view="tools"><span class="em">🛠</span><span class="txt">Tools</span></button>
      <button data-view="mcp"><span class="em">🔌</span><span class="txt">MCP</span></button>
      <button data-view="memory"><span class="em">🧠</span><span class="txt">Memory</span></button>
      <button data-view="persona"><span class="em">👤</span><span class="txt">Persona</span></button>
      <button data-view="providers"><span class="em">⚙</span><span class="txt">Providers</span></button>
      <button data-view="telegram"><span class="em">✈</span><span class="txt">Telegram</span></button>
      <button data-view="settings" style="margin-top:auto"><span class="em">⚙️</span><span class="txt">Settings</span></button>
    </div>
  </div>

  <div class="main">
    <div class="topbar" id="topbar">
      <strong id="view-title">Chat</strong>
      <button class="btn ghost sm" id="newchat-btn" style="display:none" onclick="newSession();renderChat();">+ New chat</button>
      <div class="toggle" id="mode-toggle" style="display:none">
        <button id="btn-normal" class="active" onclick="setMode('normal')">Normal</button>
        <button id="btn-rag" onclick="setMode('rag')">RAG</button>
      </div>
      <div class="reasoning" id="reasoning-box" style="display:none">
        <label>reasoning</label>
        <select id="reasoning" onchange="setReasoning(this.value)">
          <option value="auto">Auto</option>
          <option value="minimal">Minimal</option>
          <option value="low">Low</option>
          <option value="standard">Standard</option>
          <option value="high">High</option>
          <option value="max">Max</option>
        </select>
        <span class="rinfo">Auto is safest. Manual levels may be ignored or rejected by models that don't support reasoning effort.</span>
      </div>
    </div>
    <div class="view" id="view"></div>
  </div>
</div>

<script>
const API = '';
let mode = 'normal';
let sessionId = null;
let currentView = 'chat';

window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('splash').classList.add('hide'), 900);
  loadReasoning();
  showView('chat');
});

document.querySelectorAll('#nav button').forEach(b => {
  b.onclick = () => showView(b.dataset.view);
});
function showView(v){
  currentView = v;
  document.querySelectorAll('#nav button').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  document.getElementById('mode-toggle').style.display = (v === 'chat') ? '' : 'none';
  document.getElementById('reasoning-box').style.display = (v === 'chat') ? '' : 'none';
  document.getElementById('newchat-btn').style.display = (v === 'chat') ? '' : 'none';
  const titles = {chat:'Chat',pdfs:'RAG PDFs',skills:'Skills',tools:'Tools',mcp:'MCP Servers',memory:'Memory',persona:'Persona',providers:'Providers',telegram:'Telegram Gateway',settings:'Settings'};
  document.getElementById('view-title').textContent = titles[v] || v;
  if (v === 'chat') { renderChat(); }
  else if (v === 'pdfs') { renderPdfs(); }
  else if (v === 'skills') { renderSkills(); }
  else if (v === 'tools') { renderTools(); }

async function loadSessionList(){

async function selectSession(id){
  showView('chat');                       // ensure the chat view (and #messages) exists
  sessionId = id;
  const r = await fetch(API+'/api/sessions/'+id); const d = await r.json();
  const m = document.getElementById('messages'); if(!m) return; m.innerHTML='';
  (d.messages||[]).forEach(x => addMsg(x.role, x.content));

function addMsg(role, text, citations){
  const m = document.getElementById('messages'); if(!m) return;
  const d = document.createElement('div'); d.className = 'msg '+role;
  if(role==='ai'){ const t=document.createElement('div'); t.className='mode-tag'; t.textContent = mode==='rag'?'RAG mode':'Normal mode'; d.appendChild(t); }
  d.appendChild(document.createTextNode(text));
  if(role==='ai' && citations && citations.length){
    const c = document.createElement('div'); c.className='cites';
    c.innerHTML = '<b>📚 sources:</b> ' + citations.map(x=>esc(x)).join(', ');
    d.appendChild(c);
  }
  m.appendChild(d); m.scrollTop = m.scrollHeight;
}
async function send(){
  const q = document.getElementById('q'); const text = q.value.trim(); if(!text) return;
  if(!sessionId) await newSession();
  q.value=''; addMsg('user', text);
  const btn = document.getElementById('send'); btn.disabled = true;
  const ai = document.createElement('div'); ai.className='msg ai';
  const tag = document.createElement('div'); tag.className='mode-tag'; tag.textContent = mode==='rag'?'RAG mode':'Normal mode'; ai.appendChild(tag);
  const steps = document.createElement('div'); steps.className='steps'; ai.appendChild(steps);
  const body = document.createElement('div'); body.className='answer-body'; ai.appendChild(body);
  document.getElementById('messages').appendChild(ai);
  const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight;
  function stepEl(kind, html){
    const d = document.createElement('div'); d.className = 'step step-'+kind;
    d.innerHTML = html; steps.appendChild(d); m.scrollTop = m.scrollHeight; return d;
  }
  function spin(){ return '<span class="spin">▌</span>'; }
  const res = await fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode,message:text,session_id:sessionId})});
  const reader = res.body.getReader(); const dec = new TextDecoder(); let buf='';
  let thinkingEl=null, curTool=null;
  while(true){ const {done,value}=await reader.read(); if(done)break; buf+=dec.decode(value,{stream:true});
    buf.split('\n\n').forEach(part=>{ if(!part.startsWith('data: ')) return;
      try{ const j=JSON.parse(part.slice(6));
        if(j.session_id) sessionId=j.session_id;
        if(j.step==='thinking'){ thinkingEl=stepEl('thinking', '<span class="ic">🧠</span><span>'+esc(j.label||'Thinking…')+'</span>'+spin()); }
        else if(j.step==='answer'){ if(thinkingEl) thinkingEl.classList.add('done'); thinkingEl=null; stepEl('answer','<span class="ic">✍️</span><span>'+esc(j.label||'Composing answer')+'</span>'); }
        else if(j.step==='tool_start'){ if(thinkingEl){thinkingEl.classList.add('done');thinkingEl=null;} curTool=stepEl('tool', '<span class="ic">🔧</span><span class="tt">'+esc(j.tool)+'</span><span class="ta">'+esc(j.args||'')+'</span>'+spin()); }
        else if(j.step==='tool_end'){ if(curTool){curTool.classList.add('done'); const r=document.createElement('span'); r.className='tr'; r.textContent = (j.result||'').slice(0,300); curTool.appendChild(r); curTool=null;} }
        else if(j.token){ body.textContent += j.token; if(ai._cites===undefined && j.citations) ai._cites=j.citations; m.scrollTop = m.scrollHeight; }
        else if(j.citations){ ai._cites=j.citations; }
      }catch(e){}
    });
    buf='';
  }
  if(thinkingEl) thinkingEl.classList.add('done');
  if(ai._cites && ai._cites.length){ const c=document.createElement('div'); c.className='cites'; c.innerHTML='<b>📚 sources:</b> '+ai._cites.map(x=>esc(x)).join(', '); ai.appendChild(c); }
  btn.disabled=false;
}

async function testMcp(name){
  const btn = document.getElementById('test-'+name);
  if(btn){ btn.classList.remove('ok','bad'); btn.textContent='⏳'; }
  try {
    const r = await fetch(API+'/api/mcp/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});

    if(btn){ btn.textContent='🧪'; btn.classList.add(d.ok?'ok':'bad'); btn.title = d.ok?('ok — '+d.detail):('error — '+d.detail); }
    setMsgFlash(d.ok?('MCP '+name+': ok ('+d.detail+')'):('MCP '+name+': error ('+d.detail+')'));
  } catch(e){
    if(btn){ btn.textContent='🧪'; btn.classList.add('bad'); }
    setMsgFlash('MCP test failed: '+e);
  }
}
async function addMcp(){ const name=document.getElementById('mc-name').value.trim(); const type=document.getElementById('mc-type').value;
  let spec={}; if(type==='stdio'){ const parts=document.getElementById('mc-cmd').value.trim().split(/\s+/); if(!parts[0]){ return; } spec={command:parts[0], args:parts.slice(1)}; } else { const u=document.getElementById('mc-url').value.trim(); if(!u){ return; } spec={url:u}; }
  const desc=document.getElementById('mc-desc').value.trim(); if(desc) spec.description=desc;
  if(!name) return; const r=await fetch(API+'/api/mcp/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,spec})}); const d=await r.json(); renderMcp();
}

    <div class="addbar">
      <label>Active provider</label>
      <select id="prov">${opts}</select>
      <label>API key</label>
      <input id="apikey" type="password" placeholder="${cfg.has_key?'•••••• (key set)':'paste your API key'}" />
      <label>Model</label>
      <input id="model" value="${esc(cfg.model)}" placeholder="openrouter/free" />
      <button class="btn" onclick="saveProviders()">Save</button>
      <div id="prov-msg"></div>
      <div class="hint">Key present: <b>${cfg.has_key?'yes':'no'}</b> · base url: ${esc(cfg.base_url)} · reasoning: ${esc(cfg.reasoning_level)}</div>
    </div>
  </div>`;
}
async function saveProviders(){ const key=document.getElementById('apikey').value.trim(); const model=document.getElementById('model').value.trim(); const prov=document.getElementById('prov').value;
  if(prov){ await fetch(API+'/api/providers/active',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:prov})}); }
  const r=await fetch(API+'/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_key:key,model})}); const d=await r.json();
  setMsg('prov-msg', d.ok?'Saved':'Error', d.ok?'ok':'err'); document.getElementById('apikey').value=''; renderProviders();
}

/* ---------- Settings ----------
   NOTE on innerHTML safety: every dynamic value injected into innerHTML below
   (home path, python, provider, model, release notes) is passed through esc(),
   and the theme labels are a fixed constant array — never raw user input. Safe. ---------- */
const SETTINGS_NAV = [
  {id:'general', label:'General'},
  {id:'appearance', label:'Appearance'},
  {id:'data', label:'Data'},
  {id:'hermesone', label:'Aether'},
  {id:'about', label:'About & Updates'},
];
let settingsSection = 'general';

function applyAppearance(){
  fetch(API+'/api/appearance').then(r=>r.json()).then(a=>{
    document.body.className = document.body.className
      .replace(/theme-\S+/g,'').replace(/font-\S+/g,'').replace(/squared/g,'')
      .trim();
    document.body.classList.add('theme-'+a.theme);
    document.body.classList.add('font-'+a.font.toLowerCase());
    if(!a.rounded) document.body.classList.add('squared');
  }).catch(()=>{});
}

async function renderSettings(){
  const ap = await (await fetch(API+'/api/appearance')).json();
  const navHtml = SETTINGS_NAV.map(s=>`<button class="sect ${s.id===settingsSection?'active':''}" onclick="settingsGo('${s.id}')">${s.label}</button>`).join('');
  document.getElementById('view').innerHTML = `
  <div class="panel">
    <h2>Settings</h2>
    <div class="sub">Configure Aether's appearance, data, and engine.</div>
    <div class="settings-nav">${navHtml}</div>
    <div id="settings-body"></div>
  </div>`;
  if(settingsSection==='general') await renderSettingsGeneral(ap);
  else if(settingsSection==='appearance') await renderSettingsAppearance(ap);
  else if(settingsSection==='data') await renderSettingsData();
  else if(settingsSection==='hermesone') await renderSettingsHermesOne();
  else if(settingsSection==='about') await renderSettingsAbout();
}
function settingsGo(id){ settingsSection=id; renderSettings(); }

async function setAppearance(patch){
  try {
    await fetch(API+'/api/appearance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});
    applyAppearance();
  } catch(e){}
}

async function renderSettingsGeneral(ap){
  document.getElementById('settings-body').innerHTML = `
    <h3>General</h3>
    <div class="row"><label>Auto-upgrade desktop app</label>
      <span class="hint">Automatically download new Aether releases from GitHub when the app starts.</span></div>
    <label class="switchline"><input type="checkbox" id="auto-up" ${ap.auto_upgrade?'checked':''} onchange="setAppearance({auto_upgrade:this.checked})"> Enabled</label>
    <div class="ok hint">Engine updates appear under <b>Aether</b>. Desktop auto-upgrade will download and prompt you on launch.</div>`;
}

const THEMES = ["Dark","Light","Dracula","Nord","One Dark","GitHub Dark","Monokai","Solarized Dark","Gruvbox Dark","Tokyo Night","GitHub Light","Solarized Light"];
function _themeKey(label){ return label.toLowerCase().replace(/ /g,'_'); }

async function renderSettingsAppearance(ap){
  const themeOpts = THEMES.map(t=>`<option value="${_themeKey(t)}" ${ap.theme===_themeKey(t)?'selected':''}>${t}</option>`).join('');
  document.getElementById('settings-body').innerHTML = `
    <h3>Appearance</h3>
    <label>Theme</label>
    <select id="theme-sel" onchange="setAppearance({theme:this.value})">${themeOpts}</select>
    <div class="swatches">${THEMES.map(t=>`<span class="swatch theme-${_themeKey(t)}" title="${t}" onclick="setAppearance({theme:'${_themeKey(t)}'});document.getElementById('theme-sel').value='${_themeKey(t)}'"></span>`).join('')}</div>
    <label class="switchline"><input type="checkbox" id="round-s" ${ap.rounded?'checked':''} onchange="setAppearance({rounded:this.checked})"> Rounded corners <span class="hint">— turn off for squared-off corners throughout the app</span></label>
    <label>Font</label>
    <select id="font-sel" onchange="setAppearance({font:this.value})">
      <option value="Manrope" ${ap.font==='Manrope'?'selected':''}>Manrope</option>
      <option value="System" ${ap.font==='System'?'selected':''}>System</option>
    </select>
    <div class="hint">Choose the interface font.</div>`;
}

async function renderSettingsData(){
  document.getElementById('settings-body').innerHTML = `
    <h3>Data</h3>
    <div class="sub">Export or import your Aether configuration, sessions, skills, and memory.</div>
    <div class="addbar">
      <button class="btn" id="exp-btn" onclick="doExport()">Export Backup</button>
      <button class="btn ghost" id="imp-btn" onclick="document.getElementById('imp-file').click()">Import Backup</button>
      <input type="file" id="imp-file" accept=".zip" style="display:none" onchange="doImport(this)">
      <div id="data-msg" class="ok hint"></div>
      <div class="hint">Backs up config.yaml, SOUL.md, USER.md, memory/, skills/, sessions/, mcp/ into a zip. Import merges them back.</div>
    </div>`;
}
async function doExport(){
  setMsg('data-msg','Exporting…','ok');
  const d = await (await fetch(API+'/api/backup/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})})).json();
  setMsg('data-msg', d.ok?('Exported to '+d.path):('Error: '+d.error), d.ok?'ok':'err');
}
async function doImport(input){
  const f = input.files[0]; if(!f) return;
  setMsg('data-msg','Importing…','ok');
  const d = await (await fetch(API+'/api/backup/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:f.path})})).json();
  setMsg('data-msg', d.ok?'Imported. Restart Aether to apply.':'Error: '+d.error, d.ok?'ok':'err');
  input.value='';
}

async function renderSettingsHermesOne(){
  const v = await (await fetch(API+'/api/version')).json();
  const dg = await (await fetch(API+'/api/diagnose')).json();
  document.getElementById('settings-body').innerHTML = `
    <h3>Aether</h3>
    <div class="card-grid2">
      <div class="kv"><span>App</span><b>Aether Desktop</b></div>
      <div class="kv"><span>Desktop version</span><b>v${v.app_version}</b></div>
      <div class="kv"><span>Home</span><code>${esc(v.home)}</code></div>
      <div class="kv"><span>Python</span><b>${esc(v.python)}</b></div>
      <div class="kv"><span>Provider</span><b>${esc(dg.provider)}</b></div>
      <div class="kv"><span>Model</span><b>${esc(dg.model)}</b></div>

async function renderSettingsAbout(){
  setMsg('', ''); // noop
  const v = await (await fetch(API+'/api/version')).json();
  let up = {update_available:false, latest:v.app_version, download_url:'', auto_upgrade:true, release_notes:''};
  try { up = await (await fetch(API+'/api/updates/check')).json(); } catch(e){}
  document.getElementById('settings-body').innerHTML = `
    <h3>About & Updates</h3>
    <div class="card-grid2">
      <div class="kv"><span>Aether Engine</span><b>The local AI engine</b></div>
      <div class="kv"><span>Engine</span><b>v0.18.2</b></div>
      <div class="kv"><span>Released</span><b>2026.7.7.2</b></div>
      <div class="kv"><span>Python</span><b>${esc(v.python)}</b></div>
      <div class="kv"><span>OpenAI SDK</span><b>2.24.0</b></div>
      <div class="kv"><span>Home</span><code>${esc(v.home)}</code></div>
    </div>
    <div class="addbar">
      <div class="kv" style="margin-bottom:8px"><span>Update available</span><b style="color:${up.update_available?'var(--accent2)':'var(--muted)'}">${up.update_available?('v'+up.latest):'Up to date'}</b></div>
      <button class="btn" onclick="checkUpdates()">Check for updates</button>
      <button class="btn ghost" id="dl-btn" style="display:${up.update_available?'inline-block':'none'}" onclick="downloadUpdate()">Download update</button>
      <span id="up-msg" class="ok hint"></span>
    </div>
    <div class="addbar">
      <label class="switchline"><input type="checkbox" id="auto-up2" ${up.auto_upgrade?'checked':''} onchange="setAppearance({auto_upgrade:this.checked})"> Auto-upgrade desktop app <span class="hint">— automatically download new Aether releases from GitHub when the app starts. Turn this off to show the startup upgrade button without downloading until you click it.</span></label>
    </div>
    <div class="sub" style="margin-top:12px">Aether Desktop <b>v${v.app_version}</b> · <a style="color:var(--accent2)" href="#" onclick="openFolder('${esc(v.home)}')">open home</a></div>
    ${up.release_notes?`<details><summary>Release notes</summary><pre style="white-space:pre-wrap;color:var(--muted);font-size:12px">${esc(up.release_notes)}</pre></details>`:''}`;
}
async function checkUpdates(){
  setMsg('up-msg','Checking…','ok');
  const up = await (await fetch(API+'/api/updates/check')).json();
  setMsg('up-msg', up.ok?(up.update_available?('Update available: v'+up.latest):'Up to date'):('Error: '+up.error), up.ok?'ok':'err');
  renderSettingsAbout();
}
async function downloadUpdate(){
  const up = await (await fetch(API+'/api/updates/check')).json();
  if(!up.download_url){ setMsg('up-msg','No download url','err'); return; }
  setMsg('up-msg','Downloading…','ok');
  const d = await (await fetch(API+'/api/updates/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:up.download_url})})).json();
  setMsg('up-msg', d.ok?('Downloaded: '+d.path+' — run it to install'):('Error: '+d.error), d.ok?'ok':'err');
}

function setAppearance(patch){
  fetch(API+'/api/appearance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)}).then(()=>applyAppearance());
}

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function setMsg(id,text,cls){ const e=document.getElementById(id); if(e){ e.className=cls||''; e.textContent=text; } }
function setMsgFlash(t){ const d=document.createElement('div'); d.className='ok'; d.textContent=t; d.style.position='fixed'; d.bottom=20; d.right=20; d.background='var(--panel)'; d.padding='10px 16px'; d.borderRadius='10px'; d.border='1px solid var(--border)'; document.body.appendChild(d); setTimeout(()=>d.remove(),2000); }
function copyText(t){ navigator.clipboard.writeText(t).then(()=>setMsgFlash('Copied')); }
function openFolder(p){ fetch(API+'/api/openfolder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:p})}).catch(()=>{}); }
</script>
<script>applyAppearance();</script>
