# Render free-tier web service.
# 1) Push this deploy/ folder to a GitHub repo.
# 2) render.com -> New -> Blueprint -> select repo.
# 3) Set secret env: OPENROUTER_API_KEY = your key.
# 4) Deploy. Site is live 24/7 on a free .onrender.com URL.
services:
  - type: web
    name: aethermind
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python cloud_server.py"
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: PORT
        value: 8000
